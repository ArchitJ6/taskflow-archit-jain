server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to backend under /api to avoid conflicting with SPA routes
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Optional passthrough for frontend health checks
  location = /api/health {
    proxy_pass http://api:8000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Some browsers still request /favicon.ico even when svg favicon is present.
  location = /favicon.ico {
    try_files /favicon.svg =204;
    access_log off;
    log_not_found off;
  }

  # SPA routing — all other paths serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
  gzip_min_length 1024;
}
